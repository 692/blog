<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>{{ page.title }}</title>
        <meta name="description" content="{{ site.description }}"/>
        <meta name="viewport" content="width=device-width">
        <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.url }}/feed.xml">

        <!-- syntax highlighting CSS -->
        <script src="marked.js"></script>
    <link rel="stylesheet" href="github-markdown.css">
      
    </head>
    <body>

        <div id="content" class="markdown-body">   
		   <div class="header">
            <a class="extra" href="/">Home></a>
            <a class="extra" href="/?/blog/">Wiki></a>
            <a class="extra" href="https://github.com/692/">Github></a>
            <a class="extra" href="/?/blog/about.html">About></a>
            <a class="extra" href="/feed.xml">RSS</a>
          </div>
          {{ content }}

          <div class="footer">
            <div class="contact">
              <p>
              <<a href="/?/blog/">Back</a>>
              </p><a id="gotop" href="#">   
  <span>▲</span> 
</a>
            </div>
          </div>
        </div>

<script type="text/javascript">
$(function(){
	$(window).scroll(function(){  //只要窗口滚动,就触发下面代码 
		var scrollt = document.documentElement.scrollTop + document.body.scrollTop; //获取滚动后的高度 
		if( scrollt >200 ){  //判断滚动后高度超过200px,就显示  
			$("#gotop").fadeIn(400); //淡出     
		}else{      
			$("#gotop").stop().fadeOut(400); //如果返回或者没有超过,就淡入.必须加上stop()停止之前动画,否则会出现闪动   
		}
	});
	$("#gotop").click(function(){ //当点击标签的时候,使用animate在200毫秒的时间内,滚到顶部
			$("html,body").animate({scrollTop:"0px"},200);
	});
});
	var _bdhmProtocol = (("https:" == document.location.protocol) ? " https://" : " http://");
	document.write(unescape("%3Cscript src='" + _bdhmProtocol + "hm.baidu.com/h.js%3F6f8eefe3f13b327ada7a7406d2af3232' type='text/javascript'%3E%3C/script%3E"));
</script>


    </body>
</html>
